<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1280px; height:640px; overflow:hidden;
  font-family:'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  background:#F5FAF7;
}
.banner {
  position:relative; width:1280px; height:640px; overflow:hidden;
  background:#F5FAF7;
}

/* Grid */
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(46,107,79,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,107,79,0.07) 1px, transparent 1px);
  background-size:64px 64px;
}

/* Top dark stripe */
.top-stripe {
  position:absolute;
  top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, #A8D5B5, #2E6B4F 40%, #1B3A2D);
}

/* Centered content */
.center {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
  width:900px;
}

.eyebrow {
  display:inline-flex; align-items:center; gap:10px;
  margin-bottom:28px;
}
.e-line { width:40px; height:2px; background:#A8D5B5; border-radius:1px; }
.e-text { font-size:12px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:#2E6B4F; }

.logo-center {
  display:flex; align-items:center; justify-content:center;
  gap:22px; margin-bottom:14px;
}

.brand-name {
  font-size:110px;
  font-weight:900;
  letter-spacing:-0.05em;
  line-height:1;
  color:#1B3A2D;
}

.tagline {
  font-size:24px;
  font-weight:300;
  color:#2E6B4F;
  letter-spacing:-0.01em;
  margin-bottom:40px;
}
.tagline strong { font-weight:700; color:#1B3A2D; }

/* Flow row */
.flow-row {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0;
  margin-bottom:36px;
}

.flow-step {
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 32px;
  background:rgba(27,58,45,0.05);
  border:1px solid rgba(46,107,79,0.2);
  border-radius:10px;
  width:180px;
}

.flow-step.active {
  background:rgba(46,107,79,0.08);
  border-color:rgba(46,107,79,0.4);
}

.step-num {
  font-size:10px; font-weight:700; letter-spacing:0.12em;
  color:rgba(46,107,79,0.5); text-transform:uppercase;
  font-family:'Cascadia Code','Consolas',monospace;
  margin-bottom:6px;
}

.step-name {
  font-size:20px; font-weight:800; color:#1B3A2D;
  letter-spacing:-0.02em;
}

.step-desc {
  font-size:11px; color:rgba(46,107,79,0.65);
  margin-top:4px;
}

.flow-arrow {
  color:rgba(46,107,79,0.35);
  font-size:20px;
  padding:0 8px;
  margin-top:-4px;
}

/* npm badge */
.badge-row {
  display:flex; justify-content:center; gap:12px;
}

.npm-badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 22px;
  background:#1B3A2D;
  border-radius:8px;
  color:#F5FAF7;
  font-size:13px; font-weight:600;
  font-family:'Cascadia Code','Consolas',monospace;
}
.npm-dot { width:5px; height:5px; border-radius:50%; background:#A8D5B5; }

.ed-badge {
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 22px;
  border:1.5px solid rgba(46,107,79,0.3);
  border-radius:8px;
  color:#2E6B4F;
  font-size:13px; font-weight:600;
  font-family:'Cascadia Code','Consolas',monospace;
}

/* Corner decorations */
.corner-tl, .corner-br {
  position:absolute;
  width:80px; height:80px;
}
.corner-tl { top:20px; left:20px; border-top:3px solid rgba(168,213,181,0.4); border-left:3px solid rgba(168,213,181,0.4); border-radius:4px 0 0 0; }
.corner-br { bottom:20px; right:20px; border-bottom:3px solid rgba(168,213,181,0.4); border-right:3px solid rgba(168,213,181,0.4); border-radius:0 0 4px 0; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="top-stripe"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="center">
    <div class="eyebrow">
      <div class="e-line"></div>
      <span class="e-text">signed trust infrastructure for AI agents</span>
      <div class="e-line"></div>
    </div>

    <div class="logo-center">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="80" height="80">
        <polygon points="32,4 58,18 58,46 32,60 6,46 6,18" stroke="#1B3A2D" stroke-width="2" fill="rgba(168,213,181,0.2)"/>
        <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" stroke="#2E6B4F" stroke-width="1.2" fill="none"/>
        <path d="M22 32 L29 39 L42 25" stroke="#1B3A2D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="brand-name">besa</div>
    </div>

    <div class="tagline"><strong>Signed trust</strong> for AI agents.</div>

    <div class="flow-row">
      <div class="flow-step">
        <div class="step-num">01</div>
        <div class="step-name">sign</div>
        <div class="step-desc">manifest.yaml</div>
      </div>
      <div class="flow-arrow">&#8594;</div>
      <div class="flow-step active">
        <div class="step-num">02</div>
        <div class="step-name">verify</div>
        <div class="step-desc">ed25519 proof</div>
      </div>
      <div class="flow-arrow">&#8594;</div>
      <div class="flow-step active">
        <div class="step-num">03</div>
        <div class="step-name">admit</div>
        <div class="step-desc">allow / deny</div>
      </div>
      <div class="flow-arrow">&#8594;</div>
      <div class="flow-step">
        <div class="step-num">04</div>
        <div class="step-name">receipt</div>
        <div class="step-desc">tamper-evident</div>
      </div>
    </div>

    <div class="badge-row">
      <div class="npm-badge">
        <div class="npm-dot"></div>
        npm install besa
      </div>
      <div class="ed-badge">Ed25519 · TypeScript · MCP</div>
    </div>
  </div>
</div>
</body>
</html>
