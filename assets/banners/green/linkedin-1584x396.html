<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1584px; height:396px; overflow:hidden;
  font-family:'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  background:#1B3A2D;
}
.banner {
  position:relative; width:1584px; height:396px; overflow:hidden;
  background: linear-gradient(135deg, #1B3A2D 0%, #0f2218 100%);
}

/* Subtle texture */
.texture {
  position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(168,213,181,0.12) 1px, transparent 1px);
  background-size:40px 40px;
}

/* Left light panel */
.left-panel {
  position:absolute;
  left:0; top:0; bottom:0; width:700px;
  background: linear-gradient(135deg, rgba(46,107,79,0.35) 0%, transparent 100%);
  border-right:1px solid rgba(168,213,181,0.12);
}

/* Mint glow orb */
.glow {
  position:absolute;
  width:500px; height:500px;
  border-radius:50%;
  background: radial-gradient(circle, rgba(168,213,181,0.08) 0%, transparent 70%);
  top:-200px; left:-100px;
}

/* Brand */
.brand {
  position:absolute;
  left:80px; top:50%;
  transform:translateY(-50%);
}

.badge {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:4px 14px 4px 8px;
  border:1px solid rgba(168,213,181,0.3);
  border-radius:100px;
  margin-bottom:18px;
}
.badge-dot { width:7px; height:7px; border-radius:50%; background:#A8D5B5; }
.badge-text { font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:rgba(168,213,181,0.8); }

.logo-row { display:flex; align-items:center; gap:20px; margin-bottom:14px; }

.logo-mark {
  width:52px; height:52px; flex-shrink:0;
}

.brand-name {
  font-size:68px;
  font-weight:900;
  letter-spacing:-0.04em;
  line-height:1;
  color:#F5FAF7;
}

.tagline {
  font-size:18px;
  font-weight:400;
  color:rgba(168,213,181,0.75);
  letter-spacing:-0.01em;
}

.tagline strong { color:#A8D5B5; font-weight:600; }

/* Right: flow cards */
.flow-section {
  position:absolute;
  right:80px; top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:12px;
  align-items:stretch;
}

.flow-card {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(168,213,181,0.15);
  border-radius:12px;
  padding:20px 22px;
  width:190px;
  position:relative;
  overflow:hidden;
}

.flow-card::after {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,213,181,0.25),transparent);
}

.fc-step {
  font-size:10px; font-weight:700; letter-spacing:0.12em;
  text-transform:uppercase; color:rgba(168,213,181,0.5);
  margin-bottom:10px;
  font-family:'Cascadia Code','Consolas','Courier New',monospace;
}

.fc-title {
  font-size:22px; font-weight:800; color:#F5FAF7;
  letter-spacing:-0.03em; margin-bottom:8px;
}

.fc-desc {
  font-size:12px; color:rgba(168,213,181,0.6); line-height:1.5;
}

.fc-check {
  margin-top:14px;
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:11px; font-weight:600;
  color:#A8D5B5;
  font-family:'Cascadia Code','Consolas','Courier New',monospace;
}

.divider-arrow {
  display:flex; align-items:center;
  color:rgba(168,213,181,0.3);
  font-size:16px;
  padding:0 2px;
}

/* Bottom gradient line */
.bottom-line {
  position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, #2E6B4F 30%, #A8D5B5 60%, transparent);
}
</style>
</head>
<body>
<div class="banner">
  <div class="texture"></div>
  <div class="left-panel"></div>
  <div class="glow"></div>

  <div class="brand">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">signed trust infrastructure</span>
    </div>
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
          <polygon points="26,3 48,16 48,36 26,49 4,36 4,16" stroke="#A8D5B5" stroke-width="1.5" fill="rgba(46,107,79,0.2)" opacity="0.7"/>
          <polygon points="26,10 40,19 40,33 26,42 12,33 12,19" stroke="#A8D5B5" stroke-width="1" fill="none" opacity="0.4"/>
          <path d="M18 26 L24 32 L34 20" stroke="#A8D5B5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-name">besa</div>
    </div>
    <div class="tagline"><strong>Signed trust</strong> for AI agents.</div>
  </div>

  <div class="flow-section">
    <div class="flow-card">
      <div class="fc-step">01 · manifest</div>
      <div class="fc-title">Sign</div>
      <div class="fc-desc">Ed25519-signed tool capability manifest</div>
      <div class="fc-check">&#10003; signed</div>
    </div>
    <div class="divider-arrow">&#8594;</div>
    <div class="flow-card">
      <div class="fc-step">02 · proof</div>
      <div class="fc-title">Verify</div>
      <div class="fc-desc">Cryptographic signature and hash check</div>
      <div class="fc-check">&#10003; verified</div>
    </div>
    <div class="divider-arrow">&#8594;</div>
    <div class="flow-card" style="border-color:rgba(168,213,181,0.3)">
      <div class="fc-step">03 · receipt</div>
      <div class="fc-title">Admit</div>
      <div class="fc-desc">Allow / deny with tamper-evident receipt</div>
      <div class="fc-check" style="color:#6bd4a0">&#10003; admitted</div>
    </div>
  </div>

  <div class="bottom-line"></div>
</div>
</body>
</html>
