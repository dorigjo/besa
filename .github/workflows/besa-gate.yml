name: Besa manifest gate

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'tests/**'
      - 'examples/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/besa-gate.yml'

# Least privilege: this gate only reads the repo (checkout, build, verify). No writes.
permissions:
  contents: read

concurrency:
  group: besa-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  besa-gate:
    name: Verify manifest and policy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Sign the example manifest (ephemeral throwaway CI key)
        env:
          # Not a real secret: this signing key is generated inside the runner,
          # used once, and destroyed with the runner. It protects nothing.
          # examples/manifest.signed.json is a generated artifact (gitignored),
          # so the gate must produce it before it can verify it.
          BESA_KEY_PASSPHRASE: ci-only-ephemeral-passphrase-0123456789
        run: node dist/index.js sign examples/manifest.yaml

      - name: Verify signed manifest
        run: node dist/index.js verify examples/manifest.signed.json
        # Fails (exit 1) if: signature invalid, manifest tampered, or key untrusted

      - name: Gate — crm.lookup must be admitted
        run: node dist/index.js admit examples/manifest.signed.json crm.lookup
        # Exits non-zero if this tool is denied — blocks the merge

      - name: Gate — crm.delete must be denied with RISK_BLOCKED
        shell: bash
        run: |
          set +e
          output=$(node dist/index.js admit examples/manifest.signed.json crm.delete 2>&1)
          exit_code=$?
          echo "$output"
          # The denial must be proven two independent ways: a non-zero exit code
          # AND the RISK_BLOCKED reason. A matching string alone must not pass.
          if [ "$exit_code" -eq 0 ]; then
            echo "FAIL: crm.delete exited 0 — a high-risk destructive tool was admitted"
            exit 1
          fi
          if ! echo "$output" | grep -q "RISK_BLOCKED"; then
            echo "FAIL: crm.delete was denied (exit $exit_code) but without the RISK_BLOCKED reason code"
            exit 1
          fi
          echo "OK: crm.delete denied with non-zero exit ($exit_code) and RISK_BLOCKED reason code"
